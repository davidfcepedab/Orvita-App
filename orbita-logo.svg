<svg width="1000" height="1000" viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="1000" fill="#F4F7F9" />
  <defs>
    <linearGradient id="orbit-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B9FD8" />
      <stop offset="100%" stop-color="#4A7BA7" />
    </linearGradient>
    <linearGradient id="core-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.9" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="500" cy="500" r="380" stroke="url(#orbit-gradient)" stroke-width="1.5" fill="none" opacity="0.3"/>
  <circle cx="500" cy="500" r="300" stroke="url(#orbit-gradient)" stroke-width="2" fill="none" opacity="0.5"/>
  <circle cx="500" cy="500" r="220" stroke="url(#orbit-gradient)" stroke-width="2.5" fill="none" opacity="0.7"/>
  <circle cx="500" cy="500" r="80" fill="url(#core-gradient)" filter="url(#glow)"/>
  <circle cx="500" cy="500" r="65" stroke="white" stroke-width="3" fill="none" opacity="0.4"/>
  <circle cx="500" cy="220" r="18" fill="#10B981" opacity="0.85" filter="url(#glow)" />
  <circle cx="720" cy="400" r="18" fill="#F97316" opacity="0.85" filter="url(#glow)" />
  <circle cx="650" cy="650" r="18" fill="#6B9FD8" opacity="0.85" filter="url(#glow)" />
  <circle cx="350" cy="650" r="18" fill="#2DD4BF" opacity="0.85" filter="url(#glow)" />
  <circle cx="280" cy="400" r="18" fill="#818CF8" opacity="0.85" filter="url(#glow)" />
  <path d="M 500 300 Q 500 360 500 420" stroke="url(#orbit-gradient)" stroke-width="1" opacity="0.2" fill="none"/>
  <text x="500" y="860" text-anchor="middle" style="font-family: system-ui, -apple-system, sans-serif; font-size: 72px; font-weight: 700; letter-spacing: 8px; fill: #334155;">ÓRBITA</text>
  <text x="500" y="920" text-anchor="middle" style="font-family: system-ui, -apple-system, sans-serif; font-size: 32px; font-weight: 300; letter-spacing: 12px; fill: #64748B;">O S</text>
</svg>
